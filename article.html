function getSlug() {
  var parts = window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length - 1] || '';
}

function formatDate(d) {
  if (!d) return '';
  var p = d.replace(/"/g,'').trim().split('-');
  var m = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  try { return m[parseInt(p[1])-1] + ' ' + p[2] + ', ' + p[0]; } catch(e) { return d; }
}

// Parse markdown frontmatter
function parseFrontmatter(text) {
  var result = { meta: {}, body: '' };
  if (text.indexOf('---') !== 0) { result.body = text; return result; }
  var end = text.indexOf('---', 3);
  if (end === -1) { result.body = text; return result; }
  var fm = text.slice(3, end).trim();
  var body = text.slice(end + 3).trim();
  fm.split('\n').forEach(function(line) {
    var colon = line.indexOf(':');
    if (colon === -1) return;
    var key = line.slice(0, colon).trim();
    var val = line.slice(colon + 1).trim().replace(/^["']|["']$/g, '');
    result.meta[key] = val;
  });
  result.body = body;
  return result;
}

// Convert markdown to HTML
function markdownToHtml(md) {
  if (!md) return '';
  var html = md;
  // Escape existing HTML entities we don't want
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/(^- .+$\n?)+/gm, function(match) {
    var items = match.trim().split('\n').map(function(l) {
      return '<li>' + l.replace(/^- /, '') + '</li>';
    }).join('');
    return '<ul>' + items + '</ul>';
  });
  // Ordered lists
  html = html.replace(/(^\d+\. .+$\n?)+/gm, function(match) {
    var items = match.trim().split('\n').map(function(l) {
      return '<li>' + l.replace(/^\d+\. /, '') + '</li>';
    }).join('');
    return '<ol>' + items + '</ol>';
  });
  // Paragraphs - wrap lines not already wrapped in block tags
  var lines = html.split('\n');
  var result = [];
  var i = 0;
  while (i < lines.length) {
    var line = lines[i].trim();
    if (!line) { i++; continue; }
    if (/^<(h[1-4]|ul|ol|li|blockquote|table|thead|tbody|tr|th|td)/.test(line)) {
      result.push(line);
    } else {
      result.push('<p>' + line + '</p>');
    }
    i++;
  }
  return result.join('\n');
}

}
