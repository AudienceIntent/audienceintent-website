<script>
function getSlug() {
  var qs = window.location.search;
  if (qs) {
    var m = qs.match(/[?&]slug=([^&]+)/);
    if (m) return decodeURIComponent(m[1]);
  }
  var parts = window.location.pathname.split('/').filter(Boolean);
  return parts[parts.length - 1] || '';
}

function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  try { return months[parseInt(p[1]) - 1] + ' ' + p[2] + ', ' + p[0]; }
  catch(e) { return d; }
}

function render(article) {
  var wrap = document.getElementById('article-wrap');
  if (!article) {
    wrap.innerHTML = '<div class="not-found"><p style="font-size:18px;font-weight:700;margin-bottom:12px">Article not found</p><a href="/insights" style="color:#00ff73;text-decoration:none;font-size:14px">&larr; Back to Insights</a></div>';
    return;
  }

  // Title
  var metaTitle = (article.meta_title || article.title) + ' - AudienceIntent';
  document.title = metaTitle;
  document.getElementById('page-title').textContent = metaTitle;

  // Description
  var desc = article.description || article.excerpt || '';
  document.getElementById('page-desc').content = desc;

  // Canonical
  var canonical = article.canonical || ('https://audienceintent.ai/insights/' + (article.slug || ''));
  document.getElementById('page-canonical').href = canonical;

  // Author
  document.getElementById('page-author').content = article.author || 'AudienceIntent';

  // Open Graph
  document.getElementById('og-title').content = article.meta_title || article.title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('og-url').content = canonical;
  if (article.og_image) document.getElementById('og-image').content = article.og_image;
  else if (article.image) document.getElementById('og-image').content = article.image;

  // Twitter
  document.getElementById('tw-title').content = article.meta_title || article.title;
  document.getElementById('tw-desc').content = desc;
  if (article.og_image) document.getElementById('tw-image').content = article.og_image;
  else if (article.image) document.getElementById('tw-image').content = article.image;

  // Schema
  var schemaEl = document.getElementById('page-schema');
  if (schemaEl && article.schema) schemaEl.textContent = article.schema;

  // Body
  var imgHTML = article.image
    ? '<div class="art-img-wrap"><img class="art-img" src="' + article.image + '" alt="' + article.title.replace(/"/g, '') + '"></div>'
    : '';

  wrap.innerHTML =
    '<a class="back" href="/insights">&larr; Back to Insights</a>'
    + '<div class="art-cat">' + (article.category || '') + '</div>'
    + '<h1 class="art-title">' + article.title + '</h1>'
    + '<div class="art-meta"><span>' + formatDate(article.date) + '</span><span class="art-meta-dot">&middot;</span><span>' + (article.author || 'AudienceIntent') + '</span></div>'
    + imgHTML
    + '<div class="art-body">' + (article.content || '') + '</div>'
    + '<div class="cta-box"><h3>Ready to capture more revenue?</h3><p>Get your free business performance report or calculate your lost revenue in under 2 minutes.</p><div class="cta-box-btns"><a href="https://report.audienceintent.ai" target="_blank" class="cta-btn">Get My Free Report &rarr;</a><a href="https://lostrevenue.audienceintent.ai" target="_blank" class="cta-btn cta-btn-sec">Calculate My Lost Revenue</a></div></div>';
}

function init() {
  var slug = getSlug();
  fetch('/articles.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(articles) {
      var article = null;
      for (var i = 0; i < articles.length; i++) {
        if (articles[i].slug === slug) { article = articles[i]; break; }
      }
      render(article);
    })
    .catch(function(err) {
      console.error('Failed to load articles.json:', err);
      render(null);
    });
}

init();
</script>

<script>

  var b=document.getElementById('burger');

  if(!b||!m)return;
  function openMenu(){
    b.classList.add('open');m.classList.add('open');document.body.style.overflow='hidden';
    var ghl=document.getElementById('ghl-chat');if(ghl)ghl.style.display='none';
  }
  function closeMenu(){
    b.classList.remove('open');m.classList.remove('open');document.body.style.overflow='';
    var ghl=document.getElementById('ghl-chat');if(ghl)ghl.style.display='';

  window.closeMobile=closeMenu;
  b.addEventListener('click',function(e){e.stopPropagation();if(m.classList.contains('open')){closeMenu();}else{openMenu();}});
