[build]
  command = "node generate-articles.js"
  publish = "."

[[redirects]]
  from = "/insights/*.md"
  to = "/insights/:splat.md"
  status = 200
  force = false

[[redirects]]
  from = "/insights/:slug"
  to = "/article.html"
  status = 200

[[redirects]]
  from = "/#invite_token=*"
  to = "/admin/#invite_token=:splat"
  status = 301
  force = true

[[redirects]]
  from = "/#recovery_token=*"
  to = "/admin/#recovery_token=:splat"
  status = 301
  force = true
